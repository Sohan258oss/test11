<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D4A Studio – Projects</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#0D0D0D;--grey:#C0C0C0;--dark:#2A2A2A;--off:#F5F4F0;}
    html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Courier New',Courier,monospace;color:var(--off);overflow-x:hidden;}

    nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:28px 52px;display:flex;justify-content:space-between;align-items:center;background:rgba(13,13,13,0.8);backdrop-filter:blur(10px);}
    .logo{font-size:12px;font-weight:700;letter-spacing:.45em;color:var(--off);text-decoration:none;display:flex;align-items:center;}
    .logo:hover .l{animation:ldrop .5s forwards;}
    .logo:hover .l:nth-child(1){animation-delay:.00s}.logo:hover .l:nth-child(2){animation-delay:.03s}.logo:hover .l:nth-child(3){animation-delay:.06s}.logo:hover .l:nth-child(4){animation-delay:.09s}.logo:hover .l:nth-child(5){animation-delay:.12s}.logo:hover .l:nth-child(6){animation-delay:.15s}.logo:hover .l:nth-child(7){animation-delay:.18s}.logo:hover .l:nth-child(8){animation-delay:.21s}.logo:hover .l:nth-child(9){animation-delay:.24s}
    @keyframes ldrop{0%{transform:translateY(0) skewX(0)}35%{transform:translateY(12px) skewX(-10deg);opacity:0}36%{transform:translateY(-12px) skewX(10deg);opacity:0}100%{transform:translateY(0) skewX(0);opacity:1}}
    .logo .l{display:inline-block;}
    .navlinks{display:flex;gap:44px;list-style:none;}
    .navlinks li a{font-size:10px;letter-spacing:.3em;color:var(--grey);text-decoration:none;display:flex;transition:color .4s;}
    .navlinks li a:hover, .navlinks li a.active{color:var(--off);}
    .navlinks li a span{display:inline-block;transition:transform .5s cubic-bezier(.19,1,.22,1);}
    .navlinks li a:hover span{transform:translateY(-5px);}
    .navlinks li a:hover span:nth-child(2n){transform:translateY(5px);}

    .ham{display:none;flex-direction:column;gap:6px;cursor:pointer;z-index:3000;position:relative;}
    .ham span{display:block;width:24px;height:1px;background:var(--off);transition:all .4s cubic-bezier(.16,1,.3,1);}
    .ham span:nth-child(2){width:16px;align-self:flex-end;}
    .ham span:nth-child(3){width:10px;align-self:flex-end;}
    .ham.active span{width:24px !important;align-self:center;}
    .ham.active span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .ham.active span:nth-child(2){opacity:0;transform:translateX(10px);}
    .ham.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

    #mob-nav{position:fixed;inset:0;background:var(--bg);z-index:2500;display:flex;flex-direction:column;align-items:center;justify-content:center;clip-path:polygon(0 0, 100% 0, 100% 0, 0 0);transition:clip-path .8s cubic-bezier(.77,0,.175,1);pointer-events:none;}
    #mob-nav.active{clip-path:polygon(0 0, 100% 0, 100% 100%, 0 100%);pointer-events:all;}
    .mob-links{list-style:none;text-align:center;}
    .mob-links li{margin:30px 0;overflow:hidden;}
    .mob-links a{font-size:28px;letter-spacing:.3em;color:var(--off);text-decoration:none;display:block;transform:translateY(100%);transition:transform .8s cubic-bezier(.16,1,.3,1);font-weight:300;}
    #mob-nav.active .mob-links a{transform:translateY(0);}

    @media (max-width: 800px) {
      nav{padding:20px 24px;}
      .navlinks{display:none;}
      .ham{display:flex;}
    }

    #projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 40px;
      padding: 120px 52px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .project-card {
      position: relative;
      background: var(--dark);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .project-card:hover {
      transform: scale(1.02);
    }
    .project-card img {
      width: 100%;
      height: 450px;
      object-fit: cover;
      display: block;
      filter: brightness(0.8);
      transition: filter 0.4s ease;
    }
    .project-card:hover img {
      filter: brightness(1);
    }
    .project-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,13,13,0.4);
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 30px;
    }
    .project-card:hover .project-overlay {
      opacity: 1;
    }
    .project-info {
      position: relative;
      z-index: 2;
    }
    .project-title {
      font-size: 18px;
      letter-spacing: 0.2em;
      margin-bottom: 10px;
      color: var(--off);
    }
    .project-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      background: rgba(245,244,240,0.1);
      border: 1px solid rgba(245,244,240,0.2);
      color: var(--off);
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      #projects-grid {
        grid-template-columns: 1fr;
        padding: 100px 24px 40px;
      }
      .project-card img {
        height: 350px;
      }
    }



    /* ============================================================
       MODAL
    ============================================================ */
    .proj-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 500000;
      background: rgba(0,0,0,0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    @supports (backdrop-filter: blur(8px)) {
      .proj-modal-overlay {
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
    }

    .proj-modal-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .proj-modal-box {
      background: var(--dark-2);
      border: 1px solid rgba(201, 168, 76, 0.15);
      border-radius: 8px;
      width: min(860px, 95vw);
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      opacity: 0;
      transform: translateY(60px) scale(0.96);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .proj-modal-overlay.visible .proj-modal-box {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .proj-modal-box::-webkit-scrollbar { width: 3px; }
    .proj-modal-box::-webkit-scrollbar-track { background: transparent; }
    .proj-modal-box::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    .modal-close-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--white);
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      z-index: 10;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .modal-close-btn:hover {
      background: rgba(201, 168, 76, 0.15);
      border-color: var(--gold);
    }

    .modal-img-wrap {
      position: relative;
      height: 360px;
      overflow: hidden;
      border-radius: 8px 8px 0 0;
    }

    .modal-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-img-tag {
      position: absolute;
      top: 1rem; left: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(201, 168, 76, 0.4);
      padding: 0.25rem 0.65rem;
      border-radius: 2px;
    }

    .modal-body { padding: 2.5rem; }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 400;
      color: var(--white);
      margin-bottom: 1rem;
    }

    .modal-title-line {
      width: 40px; height: 1px;
      background: var(--gold);
      margin-bottom: 2rem;
    }

    .modal-meta-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(240, 237, 232, 0.08);
    }

    @media (max-width: 600px) {
      .modal-meta-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .meta-label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .meta-value {
      display: block;
      font-size: 0.95rem;
      color: var(--white);
      font-weight: 300;
    }

    .modal-desc-section { margin-bottom: 2rem; }

    .modal-desc-label {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .modal-desc-text {
      font-size: 0.92rem;
      color: rgba(240, 237, 232, 0.75);
      line-height: 1.8;
      font-weight: 300;
    }

    .modal-recognition {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 4px;
      background: rgba(201, 168, 76, 0.05);
      margin-bottom: 2rem;
    }

    .recog-star { color: var(--gold); font-size: 1rem; margin-top: 0.1rem; }
    .recog-label { display: block; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 0.25rem; }
    .recog-text { font-size: 0.88rem; color: var(--gold); }

    .modal-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    @media (max-width: 500px) {
      .modal-actions { flex-direction: column; }
      .modal-inquire-btn, .modal-close-text { width: 100%; }
    }

    .modal-inquire-btn {
      flex: 1;
      background: var(--gold);
      color: #0a0a0a;
      border: none;
      padding: 1rem 1.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      font-weight: 600;
      border-radius: 2px;
      transition: background 0.2s ease, transform 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .modal-inquire-btn:hover { background: var(--gold-light); transform: translateY(-1px); }

    .modal-close-text {
      background: transparent;
      border: 1px solid rgba(240, 237, 232, 0.2);
      color: var(--white);
      padding: 1rem 1.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      border-radius: 2px;
      transition: border-color 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .modal-close-text:hover { border-color: rgba(240, 237, 232, 0.5); }
  </style>
</head>
<body>

  <nav style="opacity:1; transform:translateY(0);">
    <a class="logo" href="index.html">
      <span class="l">D</span><span class="l">4</span><span class="l">A</span>&nbsp;<span class="l">S</span><span class="l">t</span><span class="l">u</span><span class="l">d</span><span class="l">i</span><span class="l">o</span>
    </a>
    <ul class="navlinks">
      <li><a href="index.html"><span>H</span><span>O</span><span>M</span><span>E</span></a></li>
      <li><a href="projects.html" class="active"><span>P</span><span>R</span><span>O</span><span>J</span><span>E</span><span>C</span><span>T</span><span>S</span></a></li>
      <li><a href="aboutus.html"><span>A</span><span>B</span><span>O</span><span>U</span><span>T</span><span>U</span><span>S</span></a></li>
    </ul>
    <div class="ham" id="ham">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <div id="mob-nav">
    <ul class="mob-links">
      <li><a href="index.html">HOME</a></li>
      <li><a href="projects.html">PROJECTS</a></li>
      <li><a href="aboutus.html">ABOUT</a></li>
    </ul>
  </div>

  <main id="projects-grid">
    <!-- Projects will be rendered here via JS -->
  </main>


  <!-- ── MODAL ─── -->
  <div class="proj-modal-overlay" id="modalOverlay">
    <div class="proj-modal-box" id="modalBox">
      <button class="modal-close-btn" id="modalCloseBtn">✕</button>
      <div class="modal-img-wrap">
        <img id="modalImg" src="" alt="" />
        <div class="modal-img-tag" id="modalImgTag"></div>
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-title-line"></div>
        <div class="modal-meta-grid">
          <div class="meta-item">
            <span class="meta-label">LOCATION</span>
            <span class="meta-value" id="modalLocation"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">YEAR</span>
            <span class="meta-value" id="modalYear"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">PROGRAM</span>
            <span class="meta-value" id="modalProgram"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">AREA</span>
            <span class="meta-value" id="modalArea"></span>
          </div>
        </div>
        <div class="modal-desc-section">
          <p class="modal-desc-label">PROJECT DESCRIPTION</p>
          <p class="modal-desc-text" id="modalDesc"></p>
        </div>
        <div class="modal-actions">
          <button class="modal-inquire-btn">INQUIRE ABOUT THIS PROJECT</button>
          <button class="modal-close-text" id="modalCloseText">CLOSE</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SCRIPTS ─── -->
  <script>
    /* ============================================================
       PROJECT DATA
    ============================================================ */
    const projectsData = {
      1: {
        title: 'VERTEX TOWER',
        category: 'COMMERCIAL',
        year: '2023',
        location: 'Bengaluru',
        area: '380m',
        program: 'Post-tensioned concrete megastructure',
        image: 'Amarta CH.webp',
        tags: ['React', 'Python', 'AI'],
        description: `A fundamental rethinking of the high-rise form — structural expression and spatial efficiency converge into a singular tectonic gesture. Exposed post-tension cables define both facade and interior character across 380 metres of built space.`,
      },
      2: {
        title: 'NULL PAVILION',
        category: 'INSTALLATION',
        year: '2022',
        location: 'Bengaluru',
        area: 'Temporary',
        program: 'Folded steel surface pavilion',
        image: 'Amarta EP.webp',
        tags: ['React', 'Python', 'AI'],
        description: `Material investigation into the threshold between surface and structure. A single continuous steel sheet, folded through computational geometry, generates all enclosure, support and programme without discrete elements.`,
      },
      3: {
        title: 'AXIS BRIDGE',
        category: 'INFRASTRUCTURE',
        year: '2021',
        location: 'Bengaluru',
        area: '180m',
        program: 'Carbon fibre pedestrian crossing',
        image: 'Amarta MO.webp',
        tags: ['React', 'Python', 'AI'],
        description: `Spanning 180 metres with a section depth of only 900mm. Carbon fibre composite allows structural performance impossible in conventional materials — form derived entirely from force-flow visualisation of the load paths.`,
      },
      4: {
        title: 'SECTION HOUSE',
        category: 'RESIDENTIAL',
        year: '2022',
        location: 'Bengaluru',
        area: 'Private',
        program: 'Exposed concrete residential',
        image: 'Scene1.webp',
        tags: ['React', 'Python', 'AI'],
        description: `The section drawing as architectural generator. Each floor level is displaced and exposed to the exterior, making the logic of section — normally invisible — the primary spatial and aesthetic experience.`,
      },
      5: {
        title: 'MEMBRANE LAB',
        category: 'RESEARCH',
        year: '2023',
        location: 'Bengaluru',
        area: 'Research',
        program: 'ETFE tensile research facility',
        image: 'Scene2.webp',
        tags: ['React', 'Python', 'AI'],
        description: `A research facility whose envelope is the experiment. The ETFE cushion system monitors and responds to thermal, acoustic and light conditions — making environmental performance a direct spatial phenomenon.`,
      },
      6: {
        title: 'GRID MONUMENT',
        category: 'PUBLIC',
        year: '2020',
        location: 'Bengaluru',
        area: '12m Cube',
        program: 'Public monument',
        image: 'Screenshot 2026-01-13 192650.png',
        tags: ['React', 'Python', 'AI'],
        description: `An abstract monument where the structural grid — the invisible armature of all buildings — becomes the subject. A 12-metre cube of pure structural logic, without programme, without enclosure.`,
      },
    };

    /* ============================================================
       MODAL
    ============================================================ */
    const overlay   = document.getElementById('modalOverlay');
    const closeBtn  = document.getElementById('modalCloseBtn');
    const closeText = document.getElementById('modalCloseText');

    function openModal(id) {
      const p = projectsData[id];
      if (!p) return;
      document.getElementById('modalImg').src       = p.image;
      document.getElementById('modalImg').alt       = p.title;
      document.getElementById('modalImgTag').textContent  = p.category;
      document.getElementById('modalTitle').textContent   = p.title;
      document.getElementById('modalLocation').textContent = p.location;
      document.getElementById('modalYear').textContent    = p.year;
      document.getElementById('modalProgram').textContent = p.program;
      document.getElementById('modalArea').textContent    = p.area;
      document.getElementById('modalDesc').textContent    = p.description;
      document.body.style.overflow = 'hidden';
      overlay.classList.add('visible');
    }

    function closeModal() {
      overlay.classList.remove('visible');
      document.body.style.overflow = '';
    }

    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
    closeBtn.addEventListener('click', closeModal);
    closeText.addEventListener('click', closeModal);

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    function renderProjects() {
      const grid = document.getElementById('projects-grid');
      grid.innerHTML = '';
      Object.keys(projectsData).forEach(id => {
        const p = projectsData[id];
        const card = document.createElement('div');
        card.className = 'project-card';
        card.innerHTML = `
          <img src="${p.image}" alt="${p.title}">
          <div class="project-overlay">
            <div class="project-info">
              <h3 class="project-title">${p.title}</h3>
              <div class="project-tags">
                ${p.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
              </div>
            </div>
          </div>
        `;
        card.onclick = () => openModal(id);
        grid.appendChild(card);
      });
    }
    renderProjects();


    /* ============================================================
       HAMBURGER MENU (GSAP)
    ============================================================ */
    const ham=document.getElementById('ham'),mobNav=document.getElementById('mob-nav');
    ham.addEventListener('click',()=>{
      ham.classList.toggle('active');
      mobNav.classList.toggle('active');
    });
    mobNav.querySelectorAll('a').forEach(a=>{
      a.addEventListener('click',()=>{
        ham.classList.remove('active');
        mobNav.classList.remove('active');
      });
    });

  </script>

</body>
</html>
